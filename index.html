<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nabung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F7F1E6;
    --card:#FFFDF8;
    --ink:#332821;
    --ink-soft:#8E8175;
    --ink-faint:#B8AC9C;
    --terracotta:#C97B5C;
    --terracotta-deep:#A85F44;
    --sage:#7C9174;
    --sage-deep:#5F7457;
    --gold:#C6A15B;
    --gold-soft:#E9DAB8;
    --line:#E6DCC8;
    --shadow: none;
  }
  *{ box-sizing:border-box; }
  html, body{ overflow-x:hidden; max-width:100%; }
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, #FBF0DC 0%, transparent 42%),
      radial-gradient(circle at 100% 6%, #F3E2D3 0%, transparent 38%),
      var(--cream);
    font-family:'Quicksand', sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding:36px 18px 110px;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .app{ width:100%; max-width:420px; }
  .serif, .greet h1, .goal-name, .amount-big, .add-card h3, .history h3, .submit-btn, .toast, .entry-amt, .progress-pct, .empty .e-title, .chart-card h3, .wishlist-head h3, .wish-price, .goal-form-card h3, .month-card h3, .goals-head h3, .goal-tab, .backup-card h3{
    font-family:'Baloo 2', cursive;
  }

  /* Header */
  header{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:26px; padding:0 2px; transition:opacity .2s; }
  header.header-hide{ display:none; }
  .eyebrow{
    font-size:11px; letter-spacing:2.2px; text-transform:uppercase;
    color:var(--gold); font-weight:700; margin-bottom:6px; display:block;
  }
  .greet h1{
    font-weight:700;
    font-size:34px; margin:0; color:var(--ink); line-height:1.1;
  }
  .greet p{ margin:5px 0 0; color:var(--ink-soft); font-size:12.5px; }
  .mascot{
    width:46px; height:46px; border-radius:50%;
    background:var(--card); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
    animation: bob 4.5s ease-in-out infinite;
    flex:none;
  }
  @keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-4px);} }

  .streak-chip{
    display:none; align-items:center; gap:4px; margin-top:6px;
    background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:3px 10px; font-size:11px; font-weight:800; color:var(--terracotta-deep);
    width:fit-content;
  }
  .streak-chip.show{ display:inline-flex; }

  /* Views */
  .view{ display:none; }
  .view.active{ display:block; animation:fadeIn .3s ease; }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:translateY(0);} }

  .mascot.happy{ animation: happyJump .6s ease; }
  @keyframes happyJump{
    0%{ transform:translateY(0) rotate(0deg); }
    30%{ transform:translateY(-16px) rotate(-8deg); }
    55%{ transform:translateY(0) rotate(6deg); }
    75%{ transform:translateY(-6px) rotate(-3deg); }
    100%{ transform:translateY(0) rotate(0deg); }
  }
  .mascot.wobble{ animation: wobble .55s ease; }
  @keyframes wobble{
    0%{ transform:rotate(0deg); }
    25%{ transform:rotate(-10deg) translateX(-2px); }
    50%{ transform:rotate(7deg) translateX(2px); }
    75%{ transform:rotate(-4deg); }
    100%{ transform:rotate(0deg); }
  }

  .coin-burst{
    position:fixed; pointer-events:none; z-index:80; font-size:18px;
    animation: coinFall 1s ease-in forwards;
  }
  @keyframes coinFall{
    0%{ opacity:0; transform:translateY(0) scale(.6) rotate(0deg); }
    15%{ opacity:1; transform:translateY(-14px) scale(1) rotate(20deg); }
    100%{ opacity:0; transform:translateY(70px) scale(.8) rotate(200deg); }
  }

  .confetti-piece{
    position:fixed; top:-20px; pointer-events:none; z-index:80; font-size:20px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{ opacity:1; transform:translateY(0) rotate(0deg); }
    100%{ opacity:0; transform:translateY(100vh) rotate(360deg); }
  }

  .milestone-card{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.85);
    background:var(--card); border:1px solid var(--line); border-radius:22px;
    padding:26px 30px; text-align:center; box-shadow:var(--shadow);
    z-index:90; opacity:0; transition:all .35s cubic-bezier(.34,1.56,.64,1);
    max-width:280px;
  }
  .milestone-card.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  .milestone-card .m-emoji{ font-size:38px; display:block; margin-bottom:8px; }
  .milestone-card .m-title{ font-family:'Baloo 2', cursive; font-weight:700; font-size:19px; margin-bottom:4px; }
  .milestone-card .m-sub{ font-size:12.5px; color:var(--ink-soft); }

  /* Wishlist badge */
  .wish-badge{
    display:inline-block; margin-top:4px; font-size:10px; font-weight:800;
    padding:3px 9px; border-radius:999px; letter-spacing:.2px;
  }
  .wish-badge.ready{ background:#EAF2E7; color:var(--sage-deep); }
  .wish-badge.pending{ background:var(--gold-soft); color:#8A6A2E; }

  /* Goal tabs (multi-goal) */
  .goals-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:0 2px; }
  .goals-head h3{ font-weight:700; font-size:15px; margin:0; color:var(--ink-soft); }
  .add-goal-btn{
    border:1px solid var(--line); background:var(--card); color:var(--terracotta-deep);
    font-weight:800; font-size:11.5px; padding:6px 12px; border-radius:10px; cursor:pointer;
  }
  .goal-tabs{ display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; scrollbar-width:none; }
  .goal-tabs::-webkit-scrollbar{ display:none; }
  .goal-tab{
    flex:none; padding:8px 14px; border-radius:12px; border:1px solid var(--line);
    background:var(--card); font-weight:700; font-size:12.5px; color:var(--ink-soft); cursor:pointer;
    white-space:nowrap; transition:all .2s;
  }
  .goal-tab.active{ background:var(--ink); color:#FBF2E0; border-color:var(--ink); }

  /* Goal / Jar Card */
  .jar-card{
    background:var(--card);
    border-radius:22px;
    padding:28px 24px 24px;
    box-shadow:var(--shadow);
    border:1px solid var(--line);
    margin-bottom:14px;
    position:relative;
  }
  .jar-card::before{
    content:"";
    position:absolute; inset:8px;
    border:1px solid var(--gold-soft);
    border-radius:16px;
    pointer-events:none;
  }
  .goal-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .goal-label{ font-size:10.5px; color:var(--gold); font-weight:700; letter-spacing:1.6px; text-transform:uppercase; }
  .goal-name{ font-weight:600; font-size:22px; margin:4px 0 0; }
  .goal-row-actions{ display:flex; gap:6px; flex:none; }
  .edit-btn{
    border:1px solid var(--line); background:transparent; color:var(--ink-faint);
    width:28px;height:28px;border-radius:50%; font-size:13px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex:none;
  }
  .edit-btn:active{ transform:scale(0.92); }

  .amount-big{
    font-weight:600;
    font-size:44px; margin:20px 0 2px; color:var(--terracotta-deep); letter-spacing:-1px;
  }
  .amount-sub{ font-size:12px; color:var(--ink-soft); margin-bottom:18px; }

  .progress-wrap{
    background:var(--gold-soft); border-radius:999px; height:8px; overflow:hidden;
    position:relative;
  }
  .progress-fill{
    height:100%; border-radius:999px;
    background:linear-gradient(90deg, var(--sage-deep), var(--sage));
    transition:width .7s cubic-bezier(.4,1.2,.5,1);
    min-width:8px;
  }
  .progress-meta{ display:flex; justify-content:space-between; margin-top:9px; }
  .progress-pct{ font-size:14px; color:var(--sage-deep); font-weight:600; }
  .goal-target{ font-size:11.5px; color:var(--ink-faint); }

  .level-badge{
    display:inline-flex; align-items:center; gap:5px; margin-top:7px;
    background:var(--gold-soft); color:#8A6A2E; font-weight:800; font-size:11px;
    padding:4px 10px; border-radius:999px;
  }
  .goal-eta{
    margin-top:12px; padding-top:11px; border-top:1px dashed var(--line);
    font-size:11.5px; color:var(--ink-soft); display:flex; align-items:center; gap:6px;
  }
  .goal-eta b{ color:var(--ink); font-weight:800; }

  /* Stat row */
  .stats-row{ display:flex; background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); margin-bottom:16px; overflow:hidden; }
  .stat-pill{ flex:1; text-align:center; padding:15px 6px; position:relative; }
  .stat-pill + .stat-pill::before{
    content:""; position:absolute; left:0; top:14px; bottom:14px; width:1px; background:var(--line);
  }
  .stat-pill .val{ font-family:'Baloo 2', cursive; font-weight:700; font-size:18px; }
  .stat-pill .lab{ font-size:9.5px; color:var(--ink-faint); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-top:3px; }

  /* Chart card */
  .chart-card{
    background:var(--card); border-radius:20px; padding:20px 20px 16px;
    box-shadow:var(--shadow); border:1px solid var(--line); margin-bottom:16px;
  }
  .chart-card h3{ font-weight:700; font-size:18px; margin:0 0 4px; }
  .chart-sub{ font-size:11.5px; color:var(--ink-faint); margin-bottom:16px; }
  .chart-row{ display:flex; align-items:flex-end; justify-content:space-between; height:110px; gap:5px; }
  .bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; cursor:default; }
  .bar-value{ font-size:9px; color:var(--ink-faint); margin-bottom:4px; font-weight:700; white-space:nowrap; }
  .bar{ width:100%; max-width:20px; border-radius:6px 6px 3px 3px; background:linear-gradient(180deg,var(--sage),var(--sage-deep)); min-height:4px; transition:height .5s ease; }
  .bar.negative{ background:linear-gradient(180deg,var(--terracotta),var(--terracotta-deep)); }
  .bar.today{ box-shadow:0 0 0 2px var(--gold-soft); }
  .bar-label{ font-size:10px; color:var(--ink-soft); margin-top:7px; font-weight:700; }

  /* Month recap card */
  .month-card{
    background:var(--card); border-radius:20px; padding:20px 20px 18px;
    box-shadow:var(--shadow); border:1px solid var(--line); margin-bottom:16px;
  }
  .month-card h3{ font-weight:700; font-size:18px; margin:0; }
  .month-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .month-nav{ display:flex; gap:4px; }
  .month-nav button{
    border:1px solid var(--line); background:transparent; color:var(--ink-soft);
    width:26px; height:26px; border-radius:50%; font-size:13px; cursor:pointer;
  }
  .month-sub{ font-size:11.5px; color:var(--ink-faint); margin-bottom:14px; }
  .month-stats{ display:flex; gap:10px; margin-bottom:14px; }
  .month-stat{ flex:1; background:var(--cream); border-radius:14px; padding:10px 8px; text-align:center; }
  .month-stat .m-val{ font-family:'Baloo 2', cursive; font-weight:700; font-size:15.5px; }
  .month-stat .m-lab{ font-size:9px; color:var(--ink-faint); font-weight:700; text-transform:uppercase; letter-spacing:.6px; margin-top:2px; }
  .month-goals{ font-size:12px; color:var(--ink-soft); border-top:1px dashed var(--line); padding-top:12px; }
  .month-goals b{ color:var(--ink); }

  /* Insight strip */
  .insight-box{
    margin-top:16px; padding-top:14px; border-top:1px dashed var(--line);
    display:flex; gap:10px; align-items:flex-start;
  }
  .insight-emoji{ font-size:18px; flex:none; line-height:1.3; }
  .insight-text{ font-size:12.5px; color:var(--ink-soft); line-height:1.5; }
  .insight-text b{ color:var(--ink); font-weight:800; }
  .insight-trend{
    display:inline-flex; align-items:center; gap:3px; font-weight:800; font-size:11.5px;
    padding:2px 8px; border-radius:999px; margin-left:6px; vertical-align:middle;
  }
  .insight-trend.up{ background:#EAF2E7; color:var(--sage-deep); }
  .insight-trend.down{ background:#F7ECE6; color:var(--terracotta-deep); }
  .insight-trend.flat{ background:var(--gold-soft); color:#8A6A2E; }

  /* Reminder card */
  .reminder-card{
    background:var(--card); border-radius:20px; padding:18px 20px;
    box-shadow:var(--shadow); border:1px solid var(--line); margin-bottom:16px;
  }
  .reminder-top{ display:flex; align-items:center; gap:12px; min-width:0; }
  .reminder-emoji{ font-size:24px; flex:none; }
  .reminder-body{ flex:1; min-width:0; }
  .reminder-title{ font-weight:700; font-size:14px; }
  .reminder-sub{ font-size:11px; color:var(--ink-faint); margin-top:2px; }
  .reminder-controls{
    display:flex; align-items:center; justify-content:flex-end; gap:10px;
    margin-top:12px; padding-top:12px; border-top:1px dashed var(--line);
  }
  .reminder-toggle{
    flex:none; width:46px; height:26px; border-radius:999px; border:1px solid var(--line);
    background:var(--gold-soft); position:relative; cursor:pointer; transition:background .2s;
  }
  .reminder-toggle::after{
    content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%;
    background:var(--card); transition:transform .2s; box-shadow:1px 1px 3px rgba(0,0,0,.2);
  }
  .reminder-toggle.on{ background:var(--sage-deep); }
  .reminder-toggle.on::after{ transform:translateX(20px); }
  .reminder-time{
    flex:1 1 auto; min-width:0; max-width:120px; border:1px solid var(--line); border-radius:10px;
    background:transparent; font-family:'Quicksand',sans-serif; padding:6px 8px;
    font-size:13px; font-weight:700; color:var(--ink); text-align:right;
  }

  /* Add form card */
  .add-card, .wish-form-card{
    background:var(--card); border-radius:20px; padding:22px;
    box-shadow:var(--shadow); border:1px solid var(--line); margin-bottom:20px;
  }
  .goal-form-card{
    background:var(--card); border-radius:20px; padding:0 22px;
    box-shadow:var(--shadow); border:1px solid var(--line); margin-bottom:0;
    overflow:hidden; height:0; opacity:0;
    transition:height .32s cubic-bezier(.4,0,.2,1), opacity .28s ease, margin-bottom .32s ease, padding .32s ease;
  }
  .goal-form-card.show{
    padding:22px; margin-bottom:20px;
  }
  .add-card h3, .goal-form-card h3{ font-weight:700; margin:0 0 16px; font-size:20px; }
  .field{ margin-bottom:13px; }
  .field label{ font-size:10.5px; font-weight:700; color:var(--ink-faint); text-transform:uppercase; letter-spacing:1px; }
  .field input{
    width:100%; margin-top:6px; padding:11px 3px; border-radius:0;
    border:none; border-bottom:1.5px solid var(--line); background:transparent;
    font-family:'Quicksand',sans-serif; font-size:15px; color:var(--ink); outline:none;
    transition:border-color .2s;
  }
  .field input:focus{ border-color:var(--terracotta); }
  .field input::placeholder{ color:var(--ink-faint); }
  .field select{
    width:100%; margin-top:6px; padding:11px 3px; border-radius:0;
    border:none; border-bottom:1.5px solid var(--line); background:transparent;
    font-family:'Quicksand',sans-serif; font-size:15px; color:var(--ink); outline:none;
  }

  .toggle-row{ display:flex; gap:8px; margin-bottom:16px; }
  .toggle-btn{
    flex:1; padding:9px; border-radius:12px; border:1px solid var(--line);
    background:transparent; font-weight:700; font-size:12.5px; cursor:pointer; color:var(--ink-soft);
    letter-spacing:.2px; transition:all .2s;
  }
  .toggle-btn.active-in{ background:#EEF2EA; border-color:var(--sage); color:var(--sage-deep); }
  .toggle-btn.active-out{ background:#F7ECE6; border-color:var(--terracotta); color:var(--terracotta-deep); }
  .submit-btn{
    width:100%; border:none; padding:14px; border-radius:14px;
    background:var(--ink); color:#FBF2E0; font-weight:700;
    font-size:17px; cursor:pointer; letter-spacing:.3px;
    transition:transform .15s;
  }
  .submit-btn:active{ transform:scale(0.98); }

  /* History */
  .history h3{ font-weight:700; font-size:20px; margin:0 0 12px 4px; }
  .day-group{ margin-bottom:14px; }
  .day-label{
    font-size:10.5px; font-weight:800; letter-spacing:1.4px; text-transform:uppercase;
    color:var(--gold); margin:0 0 8px 4px;
  }
  .entry{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:13px 15px; display:flex; align-items:center; gap:13px; margin-bottom:8px;
    box-shadow:none;
  }
  .entry-icon{
    width:34px;height:34px;border-radius:50%; flex:none;
    display:flex; align-items:center; justify-content:center; font-size:14px;
    border:1px solid var(--line);
  }
  .entry-icon.in{ background:#EEF2EA; color:var(--sage-deep); }
  .entry-icon.out{ background:#F7ECE6; color:var(--terracotta-deep); }
  .entry-body{ flex:1; min-width:0; }
  .entry-note{ font-weight:700; font-size:13.5px; }
  .entry-date{ font-size:11px; color:var(--ink-faint); margin-top:1px; }
  .entry-amt{ font-weight:600; font-size:15.5px; flex:none; }
  .entry-amt.in{ color:var(--sage-deep); }
  .entry-amt.out{ color:var(--terracotta-deep); }
  .del-btn{
    border:none; background:transparent; color:var(--ink-faint); font-size:13px; cursor:pointer; flex:none; padding:4px;
    opacity:.6; transition:opacity .2s;
  }
  .del-btn:hover{ opacity:1; }
  .empty{
    text-align:center; padding:34px 10px; color:var(--ink-faint); font-size:13px;
    background:var(--card); border:1px dashed var(--line); border-radius:18px;
  }
  .empty .e-emoji{ font-size:26px; display:block; margin-bottom:8px; opacity:.7; }
  .empty .e-title{ font-weight:700; color:var(--ink-soft); font-size:16px; display:block; margin-bottom:2px; }

  /* Wishlist */
  .wishlist-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; padding:0 2px; }
  .wishlist-head h3{ font-weight:700; font-size:20px; margin:0; }
  .add-wish-btn{
    border:1px solid var(--line); background:var(--card); color:var(--terracotta-deep);
    font-weight:800; font-size:12.5px; padding:9px 15px; border-radius:12px; cursor:pointer;
  }
  .photo-picker{ display:flex; align-items:center; gap:12px; margin-top:8px; }
  .photo-preview{
    width:58px; height:58px; border-radius:14px; background:var(--cream); border:1px dashed var(--line);
    display:flex; align-items:center; justify-content:center; font-size:22px; overflow:hidden; flex:none;
  }
  .photo-preview img{ width:100%; height:100%; object-fit:cover; }
  .photo-btn{
    border:1px solid var(--line); padding:9px 14px; border-radius:12px; font-size:12.5px; font-weight:700;
    color:var(--ink-soft); cursor:pointer; background:transparent;
  }
  .wish-form-actions{ display:flex; gap:10px; margin-top:6px; }
  .wish-form-actions .submit-btn, .goal-form-actions .submit-btn{ flex:2; margin-top:0; }
  .goal-form-actions{ display:flex; gap:10px; margin-top:6px; }
  .cancel-btn{
    flex:1; border:1px solid var(--line); background:transparent; color:var(--ink-soft);
    border-radius:14px; font-weight:700; font-size:14px; cursor:pointer;
  }
  .wish-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:12px; display:flex; gap:12px; align-items:center; margin-bottom:10px;
    box-shadow:none;
  }
  .wish-photo{
    width:52px; height:52px; border-radius:12px; background:var(--cream); flex:none;
    display:flex; align-items:center; justify-content:center; font-size:20px; overflow:hidden;
    border:1px solid var(--line);
  }
  .wish-photo img{ width:100%; height:100%; object-fit:cover; }
  .wish-body{ flex:1; min-width:0; }
  .wish-name{ font-weight:700; font-size:14px; }
  .wish-price{ font-weight:600; color:var(--terracotta-deep); font-size:14px; margin-top:1px; }
  .wish-note{ font-size:11px; color:var(--ink-faint); margin-top:2px; }
  .wish-actions{ display:flex; flex-direction:column; gap:8px; flex:none; }
  .wish-actions button{ border:none; background:transparent; color:var(--ink-faint); font-size:14px; cursor:pointer; padding:3px; }

  /* Backup / settings card */
  .backup-card{
    background:var(--card); border-radius:20px; padding:20px
