<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catatan Aktivitas & Keuangan Harian</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; }
  .card { background: #ffffff; border: 1px solid #eef0f3; box-shadow: 0 1px 3px rgba(15,23,42,0.04), 0 1px 2px rgba(15,23,42,0.03); }
  .glow-green { background: linear-gradient(135deg, #ecfdf5 0%, #ffffff 100%); }
  .glow-red { background: linear-gradient(135deg, #fef2f2 0%, #ffffff 100%); }
  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>
</head>
<body class="bg-[#f7f8fa] min-h-screen text-slate-800">

<div class="max-w-5xl mx-auto p-4 md:p-6 pb-24">

  <!-- HEADER -->
  <header class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-xl md:text-2xl font-extrabold text-slate-900 tracking-tight">Catatan Harian</h1>
      <p class="text-xs md:text-sm text-slate-400 mt-0.5">Aktivitas & keuangan pribadi</p>
    </div>
    <div class="w-10 h-10 rounded-full bg-slate-900 text-white flex items-center justify-center text-sm font-bold">CH</div>
  </header>

  <!-- TAB NAV -->
  <nav class="flex gap-1 mb-6 bg-white rounded-2xl shadow-sm border border-slate-100 p-1.5 overflow-x-auto sticky top-3 z-10">
    <button data-tab="dashboard" class="tab-btn flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold whitespace-nowrap transition-all">Dashboard</button>
    <button data-tab="manajemen" class="tab-btn flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold whitespace-nowrap transition-all">Kegiatan</button>
    <button data-tab="laporan" class="tab-btn flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold whitespace-nowrap transition-all">Laporan</button>
  </nav>

  <!-- TAB: DASHBOARD -->
  <section id="tab-dashboard" class="tab-content space-y-5">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="card glow-green rounded-2xl p-5">
        <div class="flex items-center justify-between mb-2">
          <p class="text-xs font-semibold text-emerald-600 uppercase tracking-wide">Total Pemasukan</p>
          <span class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-sm">↑</span>
        </div>
        <p id="totalPemasukan" class="text-2xl md:text-3xl font-extrabold text-slate-900">Rp 0</p>
      </div>
      <div class="card glow-red rounded-2xl p-5">
        <div class="flex items-center justify-between mb-2">
          <p class="text-xs font-semibold text-rose-600 uppercase tracking-wide">Total Pengeluaran</p>
          <span class="w-8 h-8 rounded-full bg-rose-100 text-rose-600 flex items-center justify-center text-sm">↓</span>
        </div>
        <p id="totalPengeluaran" class="text-2xl md:text-3xl font-extrabold text-slate-900">Rp 0</p>
      </div>
    </div>

    <div class="card rounded-2xl p-5">
      <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
        <h2 class="font-bold text-slate-900">Grafik Keuangan</h2>
        <select id="filterGrafik" class="border border-slate-200 rounded-xl px-3 py-1.5 text-xs font-medium text-slate-600 bg-slate-50 focus:outline-none">
          <option value="hari">Hari Ini</option>
          <option value="minggu">Minggu Ini</option>
          <option value="bulan" selected>Bulan Ini</option>
        </select>
      </div>
      <canvas id="chartKeuangan" height="130"></canvas>
    </div>
  </section>

  <!-- TAB: MANAJEMEN KEGIATAN -->
  <section id="tab-manajemen" class="tab-content hidden space-y-5">
    <div class="card rounded-2xl p-5">
      <h2 class="font-bold text-slate-900 mb-4">Tambah Kegiatan</h2>
      <form id="formKegiatan" class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
        <div>
          <label class="text-xs font-semibold text-slate-500 mb-1 block">Nama Kegiatan</label>
          <input required type="text" id="namaKegiatan" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900/10 focus:border-slate-300 outline-none transition">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 mb-1 block">Jam</label>
          <input required type="time" id="jamKegiatan" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900/10 focus:border-slate-300 outline-none transition">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 mb-1 block">Tanggal</label>
          <input required type="date" id="tanggalKegiatan" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900/10 focus:border-slate-300 outline-none transition">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 mb-1 block">Pemasukan (Rp)</label>
          <input type="number" min="0" id="pemasukan" value="0" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900/10 focus:border-slate-300 outline-none transition">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 mb-1 block">Pengeluaran (Rp)</label>
          <input type="number" min="0" id="pengeluaran" value="0" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900/10 focus:border-slate-300 outline-none transition">
        </div>
        <div class="sm:col-span-2">
          <label class="text-xs font-semibold text-slate-500 mb-1 block">Catatan</label>
          <textarea id="catatan" rows="2" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900/10 focus:border-slate-300 outline-none transition"></textarea>
        </div>
        <div class="sm:col-span-2">
          <button type="submit" class="w-full sm:w-auto bg-slate-900 text-white px-6 py-2.5 rounded-xl text-sm font-semibold hover:bg-slate-800 transition shadow-sm">Simpan Kegiatan</button>
        </div>
      </form>
    </div>

    <div class="card rounded-2xl p-5">
      <h2 class="font-bold text-slate-900 mb-4">Kegiatan Hari Ini</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-xs text-slate-400 uppercase tracking-wide border-b border-slate-100">
              <th class="py-2.5 pr-3 font-semibold">Jam</th>
              <th class="py-2.5 pr-3 font-semibold">Kegiatan</th>
              <th class="py-2.5 pr-3 font-semibold">Masuk</th>
              <th class="py-2.5 pr-3 font-semibold">Keluar</th>
              <th class="py-2.5 pr-3 font-semibold">Catatan</th>
              <th class="py-2.5 pr-3 font-semibold"></th>
            </tr>
          </thead>
          <tbody id="tabelHariIni"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- TAB: LAPORAN -->
  <section id="tab-laporan" class="tab-content hidden space-y-5">
    <div class="flex justify-end">
      <button id="btnCetak" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-slate-800 transition shadow-sm flex items-center gap-2">
        Cetak PDF
      </button>
    </div>

    <div id="areaLaporan" class="card rounded-2xl p-5">
      <h2 class="font-bold text-slate-900 mb-4">Laporan Lengkap</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-xs text-slate-400 uppercase tracking-wide border-b border-slate-100">
              <th class="py-2.5 pr-3 font-semibold">Tanggal</th>
              <th class="py-2.5 pr-3 font-semibold">Jam</th>
              <th class="py-2.5 pr-3 font-semibold">Kegiatan</th>
              <th class="py-2.5 pr-3 font-semibold">Masuk</th>
              <th class="py-2.5 pr-3 font-semibold">Keluar</th>
              <th class="py-2.5 pr-3 font-semibold">Catatan</th>
            </tr>
          </thead>
          <tbody id="tabelLaporan"></tbody>
          <tfoot>
            <tr class="font-bold border-t border-slate-200">
              <td colspan="3" class="py-3">Total</td>
              <td id="footerPemasukan" class="py-3 text-emerald-600"></td>
              <td id="footerPengeluaran" class="py-3 text-rose-600"></td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </section>

</div>

<script>
const STORAGE_KEY = 'catatanHarianData';

function getData() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function formatRupiah(angka) {
  return 'Rp ' + Number(angka || 0).toLocaleString('id-ID');
}
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

const tabButtons = document.querySelectorAll('.tab-btn');
const tabContents = document.querySelectorAll('.tab-content');

function setActiveTab(tab) {
  tabButtons.forEach(btn => {
    if (btn.dataset.tab === tab) {
      btn.classList.add('bg-slate-900', 'text-white');
      btn.classList.remove('text-slate-500');
    } else {
      btn.classList.remove('bg-slate-900', 'text-white');
      btn.classList.add('text-slate-500');
    }
  });
  tabContents.forEach(sec => {
    sec.classList.toggle('hidden', sec.id !== 'tab-' + tab);
  });
  if (tab === 'dashboard') renderChart();
  if (tab === 'laporan') renderLaporan();
}

tabButtons.forEach(btn => {
  btn.addEventListener('click', () => setActiveTab(btn.dataset.tab));
});

const form = document.getElementById('formKegiatan');
document.getElementById('tanggalKegiatan').value = todayStr();

form.addEventListener('submit', function(e) {
  e.preventDefault();
  const data = getData();
  const newItem = {
    id: Date.now().toString(),
    tanggal: document.getElementById('tanggalKegiatan').value,
    namaKegiatan: document.getElementById('namaKegiatan').value,
    jamKegiatan: document.getElementById('jamKegiatan').value,
    pemasukan: Number(document.getElementById('pemasukan').value) || 0,
    pengeluaran: Number(document.getElementById('pengeluaran').value) || 0,
    catatan: document.getElementById('catatan').value
  };
  data.push(newItem);
  saveData(data);
  form.reset();
  document.getElementById('tanggalKegiatan').value = todayStr();
  document.getElementById('pemasukan').value = 0;
  document.getElementById('pengeluaran').value = 0;
  renderTabelHariIni();
  renderDashboardTotals();
  renderChart();
});

function renderTabelHariIni() {
  const data = getData().filter(d => d.tanggal === todayStr());
  const tbody = document.getElementById('tabelHariIni');
  tbody.innerHTML = '';
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="py-6 text-center text-slate-300 text-sm">Belum ada data hari ini</td></tr>';
    return;
  }
  data.sort((a,b) => a.jamKegiatan.localeCompare(b.jamKegiatan));
  data.forEach(item => {
    const tr = document.createElement('tr');
    tr.className = 'border-b border-slate-50 hover:bg-slate-50/50 transition';
    tr.innerHTML = `
      <td class="py-3 pr-3 text-slate-600">${item.jamKegiatan}</td>
      <td class="py-3 pr-3 font-medium text-slate-800">${item.namaKegiatan}</td>
      <td class="py-3 pr-3 text-emerald-600 font-medium">${formatRupiah(item.pemasukan)}</td>
      <td class="py-3 pr-3 text-rose-600 font-medium">${formatRupiah(item.pengeluaran)}</td>
      <td class="py-3 pr-3 text-slate-500">${item.catatan || '-'}</td>
      <td class="py-3 pr-3">
        <button class="btnHapus text-rose-500 hover:text-rose-700 text-xs font-semibold" data-id="${item.id}">Hapus</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('.btnHapus').forEach(btn => {
    btn.addEventListener('click', function() {
      let data = getData();
      data = data.filter(d => d.id !== this.dataset.id);
      saveData(data);
      renderTabelHariIni();
      renderDashboardTotals();
      renderChart();
      renderLaporan();
    });
  });
}

function renderDashboardTotals() {
  const data = getData();
  const totalPemasukan = data.reduce((sum, d) => sum + Number(d.pemasukan || 0), 0);
  const totalPengeluaran = data.reduce((sum, d) => sum + Number(d.pengeluaran || 0), 0);
  document.getElementById('totalPemasukan').textContent = formatRupiah(totalPemasukan);
  document.getElementById('totalPengeluaran').textContent = formatRupiah(totalPengeluaran);
}

function filterByPeriode(data, periode) {
  const now = new Date();
  return data.filter(d => {
    const tgl = new Date(d.tanggal + 'T00:00:00');
    if (periode === 'hari') {
      return d.tanggal === todayStr();
    }
    if (periode === 'minggu') {
      const startOfWeek = new Date(now);
      const day = startOfWeek.getDay();
      const diff = (day === 0 ? 6 : day - 1);
      startOfWeek.setDate(now.getDate() - diff);
      startOfWeek.setHours(0,0,0,0);
      const endOfWeek = new Date(startOfWeek);
      endOfWeek.setDate(startOfWeek.getDate() + 6);
      endOfWeek.setHours(23,59,59,999);
      return tgl >= startOfWeek && tgl <= endOfWeek;
    }
    if (periode === 'bulan') {
      return tgl.getMonth() === now.getMonth() && tgl.getFullYear() === now.getFullYear();
    }
    return true;
  });
}

let chartInstance = null;
function renderChart() {
  const periode = document.getElementById('filterGrafik').value;
  const data = filterByPeriode(getData(), periode);

  const grouped = {};
  data.forEach(d => {
    if (!grouped[d.tanggal]) grouped[d.tanggal] = { pemasukan: 0, pengeluaran: 0 };
    grouped[d.tanggal].pemasukan += Number(d.pemasukan || 0);
    grouped[d.tanggal].pengeluaran += Number(d.pengeluaran || 0);
  });
  const labels = Object.keys(grouped).sort();
  const pemasukanData = labels.map(l => grouped[l].pemasukan);
  const pengeluaranData = labels.map(l => grouped[l].pengeluaran);

  const ctx = document.getElementById('chartKeuangan').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels.length ? labels : ['Tidak ada data'],
      datasets: [
        {
          label: 'Pemasukan',
          data: pemasukanData.length ? pemasukanData : [0],
          backgroundColor: '#10b981',
          borderRadius: 6,
          maxBarThickness: 28
        },
        {
          label: 'Pengeluaran',
          data: pengeluaranData.length ? pengeluaranData : [0],
          backgroundColor: '#f43f5e',
          borderRadius: 6,
          maxBarThickness: 28
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'top', labels: { usePointStyle: true, font: { family: 'Plus Jakarta Sans' } } }
      },
      scales: {
        y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
        x: { grid: { display: false } }
      }
    }
  });
}

document.getElementById('filterGrafik').addEventListener('change', renderChart);

function renderLaporan() {
  const data = getData().slice().sort((a,b) => (a.tanggal + a.jamKegiatan).localeCompare(b.tanggal + b.jamKegiatan));
  const tbody = document.getElementById('tabelLaporan');
  tbody.innerHTML = '';
  let totalPemasukan = 0, totalPengeluaran = 0;

  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="py-6 text-center text-slate-300 text-sm">Belum ada data</td></tr>';
  } else {
    data.forEach(item => {
      totalPemasukan += Number(item.pemasukan || 0);
      totalPengeluaran += Number(item.pengeluaran || 0);
      const tr = document.createElement('tr');
      tr.className = 'border-b border-slate-50';
      tr.innerHTML = `
        <td class="py-3 pr-3 text-slate-600">${item.tanggal}</td>
        <td class="py-3 pr-3 text-slate-600">${item.jamKegiatan}</td>
        <td class="py-3 pr-3 font-medium text-slate-800">${item.namaKegiatan}</td>
        <td class="py-3 pr-3 text-emerald-600 font-medium">${formatRupiah(item.pemasukan)}</td>
        <td class="py-3 pr-3 text-rose-600 font-medium">${formatRupiah(item.pengeluaran)}</td>
        <td class="py-3 pr-3 text-slate-500">${item.catatan || '-'}</td>
      `;
      tbody.appendChild(tr);
    });
  }
  document.getElementById('footerPemasukan').textContent = formatRupiah(totalPemasukan);
  document.getElementById('footerPengeluaran').textContent = formatRupiah(totalPengeluaran);
}

document.getElementById('btnCetak').addEventListener('click', function() {
  const element = document.getElementById('areaLaporan');
  const opt = {
    margin: 0.3,
    filename: 'laporan-keuangan-' + todayStr() + '.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
  };
  html2pdf().set(opt).from(element).save();
});

setActiveTab('dashboard');
renderDashboardTotals();
renderTabelHariIni();
renderChart();
renderLaporan();
</script>

</body>
</html>
